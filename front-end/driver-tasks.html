<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Active Tasks - Smart Waste Management Driver</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .driver-layout {
      display: grid;
      grid-template-rows: 70px 1fr 80px;
      min-height: 100vh;
      background: white;
    }

    /* Header */
    .driver-header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .driver-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .driver-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .driver-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .driver-status {
      font-size: 0.8rem;
      color: #64748b;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      background: #d1fae5;
      color: #065f46;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .status-pulse {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Main Content */
    .driver-content {
      display: grid;
      grid-template-columns: 1fr 400px;
      overflow: hidden;
    }

    .map-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: #e2e8f0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-controls {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 10;
    }

    .map-btn {
      width: 40px;
      height: 40px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #10b981;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
    }

    .map-btn:hover {
      background: #10b981;
      color: white;
      transform: scale(1.1);
    }

    /* Tasks Panel */
    .tasks-panel {
      background: white;
      border-left: 1px solid #e2e8f0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .tasks-header {
      padding: 1.5rem;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .tasks-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .tasks-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #64748b;
    }

    .stat-value {
      font-weight: 600;
      color: #10b981;
    }

    .tasks-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .task-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: #10b981;
    }

    .task-card:hover {
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1);
      transform: translateY(-2px);
    }

    .task-card.completed {
      opacity: 0.6;
      border-style: dashed;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 0.75rem;
    }

    .task-id {
      font-weight: 600;
      font-size: 0.95rem;
      color: #0f172a;
    }

    .fill-badge {
      padding: 0.3rem 0.7rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .fill-high {
      background: #fee2e2;
      color: #991b1b;
    }

    .fill-medium {
      background: #fef3c7;
      color: #b45309;
    }

    .fill-low {
      background: #dbeafe;
      color: #0c4a6e;
    }

    .task-details {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .task-location {
      font-size: 0.85rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .task-distance {
      font-size: 0.8rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .task-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    .btn-navigate {
      background: #e0f2fe;
      color: #0369a1;
    }

    .btn-navigate:hover {
      background: #7dd3fc;
    }

    .btn-collect {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .btn-collect:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }

    .btn-failed {
      background: #fee2e2;
      color: #dc2626;
    }

    .btn-failed:hover {
      background: #fca5a5;
    }

    /* Bottom Bar */
    .driver-bottom-bar {
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 1rem;
      display: flex;
      gap: 1rem;
      justify-content: space-between;
    }

    .btn-lg {
      flex: 1;
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-support {
      background: #f0f9ff;
      color: #0372a3;
      border: 2px solid #0384c7;
    }

    .btn-support:hover {
      background: #e0f2fe;
    }

    .btn-end-route {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    .btn-end-route:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 1rem;
      right: 1rem;
      max-width: 400px;
      background: white;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 500;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .toast.show {
      display: flex;
    }

    .toast.hide {
      display: none;
    }

    .toast-success {
      border-left: 4px solid #10b981;
      color: #065f46;
    }

    .toast-error {
      border-left: 4px solid #dc2626;
      color: #991b1b;
    }

    .toast-icon {
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    /* Empty state */
    .empty-state {
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .empty-desc {
      font-size: 0.9rem;
      color: #64748b;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: slideUp 0.3s ease;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .modal-desc {
      color: #64748b;
      margin-bottom: 2rem;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .driver-content {
        grid-template-columns: 1fr;
      }

      .tasks-panel {
        position: absolute;
        bottom: 80px;
        left: 0;
        right: 0;
        max-height: 300px;
        border-left: none;
        border-top: 1px solid #e2e8f0;
        border-radius: 20px 20px 0 0;
      }
    }

    @media (max-width: 768px) {
      .driver-layout {
        grid-template-rows: 60px 1fr 80px;
      }

      .driver-header {
        padding: 0.75rem;
      }

      .driver-info {
        gap: 0.75rem;
      }

      .driver-avatar {
        width: 32px;
        height: 32px;
        font-size: 0.75rem;
      }

      .driver-name {
        font-size: 0.85rem;
      }

      .status-badge {
        font-size: 0.7rem;
        padding: 0.3rem 0.6rem;
      }

      .tasks-header {
        padding: 1rem;
      }

      .tasks-title {
        font-size: 0.95rem;
      }

      .task-card {
        padding: 1rem;
      }

      .btn-lg {
        font-size: 0.8rem;
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="driver-layout">
    <!-- Header -->
    <div class="driver-header">
      <div class="driver-info">
        <div class="driver-avatar" id="driverAvatar">AR</div>
        <div>
          <div class="driver-name" id="driverName">Ahmed Ramirez</div>
          <div class="driver-status">Route #47</div>
        </div>
      </div>
      <div class="status-badge">
        <span class="status-pulse"></span>
        <span>Online</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="driver-content">
      <!-- Map Container -->
      <div class="map-container">
        <div id="map"></div>
        <div class="map-controls">
          <button class="map-btn" title="Zoom In" onclick="zoomMap(1)">
            <i class="fas fa-plus"></i>
          </button>
          <button class="map-btn" title="Zoom Out" onclick="zoomMap(-1)">
            <i class="fas fa-minus"></i>
          </button>
          <button class="map-btn" title="Current Location" onclick="centerMap()">
            <i class="fas fa-location-crosshairs"></i>
          </button>
          <button class="map-btn" title="Optimize Route" onclick="optimizeRoute()">
            <i class="fas fa-route"></i>
          </button>
        </div>
      </div>

      <!-- Tasks Panel -->
      <div class="tasks-panel">
        <div class="tasks-header">
          <div class="tasks-title">Active Tasks</div>
          <div class="tasks-stats">
            <div class="stat">
              <i class="fas fa-check"></i>
              <span class="stat-value" id="completed">3</span> Completed
            </div>
            <div class="stat">
              <i class="fas fa-list"></i>
              <span class="stat-value" id="remaining">8</span> Remaining
            </div>
          </div>
        </div>

        <div class="tasks-list" id="tasksList">
          <!-- Tasks will be populated by JavaScript -->
        </div>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="driver-bottom-bar">
      <button class="btn-lg btn-support" onclick="callSupport()">
        <i class="fas fa-headset"></i> Support
      </button>
      <button class="btn-lg btn-end-route" onclick="endRoute()">
        <i class="fas fa-flag-checkered"></i> End Route
      </button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast hide" id="toast">
    <span class="toast-icon"><i class="fas fa-check-circle"></i></span>
    <span id="toastMessage">Action completed</span>
  </div>

  <!-- Modals -->
  <div class="modal" id="endRouteModal">
    <div class="modal-content">
      <div class="modal-title">End Collection Route?</div>
      <div class="modal-desc">
        You have 2 tasks remaining. Are you sure you want to end this route?
      </div>
      <div class="modal-buttons">
        <button class="btn-lg" style="background: #f1f5f9; color: #0f172a;" onclick="closeModal('endRouteModal')">
          Cancel
        </button>
        <button class="btn-lg" style="background: #ef4444; color: white;" onclick="confirmEndRoute()">
          End Route
        </button>
      </div>
    </div>
  </div>

  <div class="modal" id="supportModal">
    <div class="modal-content">
      <div class="modal-title">Need Help?</div>
      <div class="modal-desc">
        Contact support or report an issue
      </div>
      <div style="display: flex; flex-direction: column; gap: 0.75rem;">
        <button class="btn-lg" style="background: #e0f2fe; color: #0369a1; justify-content: flex-start;">
          <i class="fas fa-phone"></i> Call: +1-800-2627
        </button>
        <button class="btn-lg" style="background: #e0f2fe; color: #0369a1; justify-content: flex-start;">
          <i class="fas fa-comments"></i> Chat with Support
        </button>
        <button class="btn-lg" style="background: #f1f5f9; color: #0f172a; justify-content: flex-start;" onclick="closeModal('supportModal')">
          <i class="fas fa-times"></i> Close
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    let map;
    let tasks = [];
    let completedCount = 0;

    // Load driver name on page load
    window.addEventListener('DOMContentLoaded', () => {
      const userName = localStorage.getItem('userName') || 'Driver';
      const nameElement = document.getElementById('driverName');
      const avatarElement = document.getElementById('driverAvatar');
      
      if (nameElement) {
        nameElement.textContent = userName;
      }
      
      if (avatarElement) {
        const initials = userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        avatarElement.textContent = initials;
      }
    });

    // Initialize map
    function initMap() {
      map = L.map('map').setView([-37.8136, 144.9631], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19
      }).addTo(map);

      // Add sample markers
      addBinMarkers();
    }

    function addBinMarkers() {
      const locations = [
        { lat: -37.8136, lng: 144.9631, id: 'BIN-2847', fill: 85 },
        { lat: -37.8146, lng: 144.9641, id: 'BIN-2845', fill: 65 },
        { lat: -37.8126, lng: 144.9621, id: 'BIN-2843', fill: 45 },
        { lat: -37.8156, lng: 144.9661, id: 'BIN-2853', fill: 90 },
        { lat: -37.8116, lng: 144.9611, id: 'BIN-2841', fill: 25 }
      ];

      locations.forEach((loc, idx) => {
        const color = loc.fill > 75 ? '#dc2626' : loc.fill > 50 ? '#f59e0b' : '#10b981';
        const marker = L.marker([loc.lat, loc.lng], {
          icon: L.divIcon({
            html: `<div style="background: ${color}; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.75rem; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
              <i class="fas fa-trash" style="font-size: 0.9rem;"></i>
            </div>`,
            iconSize: [32, 32],
            className: ''
          })
        }).addTo(map);

        tasks.push({
          id: idx + 1,
          binId: loc.id,
          location: ['Downtown Market', 'Park Avenue', 'School Road', 'Central Plaza', 'Market Street'][idx],
          distance: (Math.random() * 5 + 0.5).toFixed(1),
          fill: loc.fill,
          completed: false,
          lat: loc.lat,
          lng: loc.lng
        });
      });

      renderTasks();
    }

    function renderTasks() {
      const tasksList = document.getElementById('tasksList');
      tasksList.innerHTML = '';

      tasks.forEach(task => {
        const fillClass = task.fill > 75 ? 'fill-high' : task.fill > 50 ? 'fill-medium' : 'fill-low';
        const fillLabel = task.fill > 75 ? `${task.fill}% 🔴` : task.fill > 50 ? `${task.fill}% 🟡` : `${task.fill}% 🟢`;
        
        const card = document.createElement('div');
        card.className = `task-card ${task.completed ? 'completed' : ''}`;
        card.innerHTML = `
          <div class="task-header">
            <div class="task-id">🗑️ ${task.binId}</div>
            <span class="fill-badge ${fillClass}">${fillLabel}</span>
          </div>
          <div class="task-details">
            <div class="task-location">
              <i class="fas fa-map-marker"></i> ${task.location}
            </div>
            <div class="task-distance">
              <i class="fas fa-road"></i> ${task.distance} km away
            </div>
          </div>
          <div class="task-actions">
            <button class="btn btn-navigate" onclick="navigateTo(${task.id})">
              <i class="fas fa-directions"></i> Navigate
            </button>
            <button class="btn btn-collect" onclick="markCollected(${task.id})" ${task.completed ? 'disabled' : ''}>
              <i class="fas fa-check"></i> Collect
            </button>
          </div>
        `;
        tasksList.appendChild(card);
      });
    }

    function markCollected(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (task) {
        task.completed = true;
        completedCount++;
        document.getElementById('completed').textContent = completedCount;
        document.getElementById('remaining').textContent = tasks.length - completedCount;
        
        showToast(`✓ Bin ${task.binId} collected successfully!`, 'success');
        renderTasks();
        
        // Zoom to next uncompleted task
        const nextTask = tasks.find(t => !t.completed);
        if (nextTask) {
          map.setView([nextTask.lat, nextTask.lng], 15);
        }
      }
    }

    function navigateTo(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (task) {
        map.setView([task.lat, task.lng], 16);
        showToast(`🗺️ Navigating to ${task.binId}...`, 'success');
      }
    }

    function optimizeRoute() {
      showToast('🔄 Route optimized!', 'success');
    }

    function zoomMap(level) {
      map.setZoom(map.getZoom() + level);
    }

    function centerMap() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const { latitude, longitude } = pos.coords;
          map.setView([latitude, longitude], 14);
          showToast('📍 Centered on your location', 'success');
        }, () => map.setView([-37.8136, 144.9631], 14));
      }
    }

    function callSupport() {
      document.getElementById('supportModal').classList.add('show');
    }

    function endRoute() {
      document.getElementById('endRouteModal').classList.add('show');
    }

    function confirmEndRoute() {
      closeModal('endRouteModal');
      showToast('✓ Route ended. Great work today!', 'success');
      setTimeout(() => {
        // alert('Redirecting to dashboard...');
        // window.location.href = 'dashboard-driver.html';
      }, 2000);
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('show');
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = message;
      toast.className = `toast show toast-${type}`;
      toast.querySelector('.toast-icon').innerHTML = type === 'success' 
        ? '<i class="fas fa-check-circle"></i>' 
        : '<i class="fas fa-exclamation-circle"></i>';
      
      setTimeout(() => {
        toast.classList.add('hide');
      }, 3000);
    }

    // Click outside modals to close
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('show');
        }
      });
    });

    window.addEventListener('load', initMap);
  </script>
</body>
</html>
